{% extends "base.html" %}
{% block title %}Edit {{ row.Ticket }}{% endblock %}

{% block content %}
<h1>Edit Ticket {{ row.Ticket }}</h1>

<form method="post" action="{{ url_for('tickets.update', ticket=row.Ticket) }}">

  <div class="field">
    <label>Ticket ID</label>
    <input value="{{ row.Ticket }}" disabled>
    <div style="font-size:12px; color:#6b7280;">
      (Ticket ID is the primary key and cannot be changed)
    </div>
  </div>

  <div class="field">
    <label for="Status">Status</label>
    <select id="Status" name="Status" required>
      <option value="Open"    {% if row.Status == 'Open' %}selected{% endif %}>Open</option>
      <option value="In Prog" {% if row.Status == 'In Prog' %}selected{% endif %}>In Prog</option>
      <option value="Closed"  {% if row.Status == 'Closed' %}selected{% endif %}>Closed</option>
    </select>
  </div>

  <div class="field">
    <label for="CreatedBy">Created By</label>
    <input id="CreatedBy" name="CreatedBy" value="{{ row.CreatedBy }}" required>
  </div>

  <div class="field">
    <label for="PriorityID">Priority</label>
    <input id="PriorityID" name="PriorityID" type="number" min="1" step="1" value="{{ row.PriorityID }}" required>
  </div>

  <label for="statusid">Status ID</label>
<select id="statusid" name="StatusID">
  <option value="Assigned" {{ 'selected' if row.StatusID == 'Assigned' else '' }}>Assigned</option>
  <option value="Not Assigned" {{ 'selected' if row.StatusID == 'Not Assigned' else '' }}>Not Assigned</option>
</select>

  <button class="btn" type="submit">Save Changes</button>
  <a class="btn secondary" href="{{ url_for('tickets.detail', ticket=row.Ticket) }}">Cancel</a>

</form>
{% endblock %}
